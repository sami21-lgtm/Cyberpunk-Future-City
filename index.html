<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sami | Cyberpunk Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="https://github.com/sami21-lgtm" target="_blank">GitHub</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    
    <div id="bg-slider">
        <div class="slide-bg active" style="background-image: url('download (1).jpg')"></div>
        <div class="slide-bg" style="background-image: url('download (2).jpg')"></div>
        <div class="slide-bg" style="background-image: url('download (3).jpg')"></div>
       
        <div class="dark-overlay"></div>
    </div>

  
    <div class="content-wrapper">
        <div class="text-content">
            <div class="title">CYBERPUNK</div>
            <div class="topic">DHAKA CITY</div>
            <div class="des">Experience the fusion of tradition and high-tech in futuristic Bangladesh.</div>
            <div class="buttons">
                <button onclick="window.open('https://github.com/sami21-lgtm', '_blank')">PORTFOLIO</button>
                <button onclick="window.open('https://github.com/sami21-lgtm', '_blank')">VIEW CODE</button>
            </div>
        </div>

        
        <div class="bottom-bar">
            <div class="arrows">
                <button id="prev" type="button">&lt;</button>
                <button id="next" type="button">&gt;</button>
            </div>
            
            <div class="credits">
                Development by Md. Emtiaz Hossain Sami, Dept. of Software Engineering
            </div>

            <div class="thumbnails">
                <div class="thumb active" onclick="goToSlide(0)"><img src="download (1).jpg"></div>
                <div class="thumb" onclick="goToSlide(1)"><img src="download (2).jpg"></div>
                <div class="thumb" onclick="goToSlide(2)"><img src="download (3).jpg"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
