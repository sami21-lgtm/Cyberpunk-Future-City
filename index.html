<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami | Cyberpunk Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="https://github.com/sami21-lgtm" target="_blank">GitHub</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="bg-slider">

        <div class="bg-slide active" style="background-image: url('https://images.unsplash.com/photo-1563089145-599997674d42?w=1920');" data-color="rgba(255, 0, 100, 0.4)"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1534224039826-c7a0eda0e6b3?w=1920');" data-color="rgba(0, 100, 255, 0.4)"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1920');" data-color="rgba(163, 255, 0, 0.4)"></div>
        
        <div class="color-overlay"></div>
        <div class="dark-overlay"></div>
    </div>

    <div class="main-content">
        <div class="year">YEAR 2077</div>
        <div class="title">CYBERPUNK</div>
        <div class="topic">DHAKA CITY</div>
        <div class="des">Experience the fusion of tradition and high-tech in futuristic Bangladesh.</div>
        
        <div class="buttons">
            <button onclick="window.open('https://github.com/sami21-lgtm', '_blank')">PORTFOLIO</button>
            <button onclick="window.open('https://github.com/sami21-lgtm/Cyberpunk-Future-City', '_blank')">VIEW CODE</button>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="arrows">
            <button id="prevBtn">&lt;</button>
            <button id="nextBtn">&gt;</button>
        </div>
        <div class="credits">
            Development by Md. Emtiaz Hossain Sami, Dept. of Software Engineering
        </div>
    </div>

   
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var nextBtn = document.getElementById('nextBtn');
            var prevBtn = document.getElementById('prevBtn');
            var slides = document.querySelectorAll('.bg-slide');
            var colorOverlay = document.querySelector('.color-overlay');
            
            var current = 0;

            function changeBg(direction) {
                slides[current].classList.remove('active');

                if (direction === 'next') {
                    current = (current + 1) % slides.length; 
                } else {
                    current = (current - 1 + slides.length) % slides.length; 
                }

                slides[current].classList.add('active');
                var newColor = slides[current].getAttribute('data-color');
                colorOverlay.style.background = newColor;
            }

            nextBtn.addEventListener('click', function() { 
                changeBg('next'); 
            });
            prevBtn.addEventListener('click', function() { 
                changeBg('prev'); 
            });
        });
    </script>
</body>
</html>
