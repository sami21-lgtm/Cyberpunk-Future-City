<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future City Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="carousel">
        <div class="list">
            <!-- Slide 1: Cyberpunk Dhaka -->
            <div class="item">
                <img src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=1920&q=80">
                <div class="content">
                    <div class="author">YEAR 2077</div>
                    <div class="title">CYBERPUNK</div>
                    <div class="topic">DHAKA CITY</div>
                    <div class="des">Experience the fusion of tradition and high-tech in the heart of futuristic Bangladesh.</div>
                    <div class="buttons">
                        <button>EXPLORE</button>
                        <button>VIEW CODE</button>
                    </div>
                </div>
            </div>

            <!-- Slide 2: Tech Metropolis -->
            <div class="item">
                <img src="https://images.unsplash.com/photo-1515462277126-2dd0c162007a?auto=format&fit=crop&w=1920&q=80">
                <div class="content">
                    <div class="author">NEON LIGHTS</div>
                    <div class="title">TECHNO</div>
                    <div class="topic">METROPOLIS</div>
                    <div class="des">A world where neon never sleeps and technology flows through every street corner.</div>
                    <div class="buttons">
                        <button>EXPLORE</button>
                        <button>VIEW CODE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnail">
            <div class="item">
                <img src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=150&q=80">
                <div class="content"><div class="title">Cyber Dhaka</div></div>
            </div>
            <div class="item">
                <img src="https://images.unsplash.com/photo-1515462277126-2dd0c162007a?auto=format&fit=crop&w=150&q=80">
                <div class="content"><div class="title">Metropolis</div></div>
            </div>
        </div>

        <div class="arrows">
            <button id="prev"><</button>
            <button id="next">></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
